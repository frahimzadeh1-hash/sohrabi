<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تولید سخنرانی | دکتر سهرابی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { font-family: Tahoma; }
        body { background: #f5f5f5; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; margin: 15px auto; max-width: 1200px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { background: #1a1a1a; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; border: 2px solid #4a7c59; }
        .header h2 { color: #4a7c59; }
        .header a { color: #ccc; margin: 0 10px; text-decoration: none; }
        .header a:hover { color: #4a7c59; }
        .flag-strip { height: 3px; background: linear-gradient(90deg, #4a7c59 33%, white 33%, white 66%, #8b3c3c 66%); max-width: 150px; margin: 5px auto; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        .btn-ai { background: linear-gradient(90deg, #8b5cf6, #6d28d9); color: white; }
        .btn-normal { background: #4a7c59; color: white; }
        .btn-copy { background: #f59e0b; color: black; margin-top: 10px; }
        .speech-box { background: #f9f9f9; padding: 30px; border-radius: 15px; line-height: 2.8; white-space: pre-wrap; border: 2px solid #4a7c59; }
        .ai-badge { background: linear-gradient(90deg, #8b5cf6, #6d28d9); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size:2rem;">🇮🇷</div>
        <div class="flag-strip"></div>
        <h2>🎤 تولید سخنرانی</h2>
        <a href="/">📊 داشبورد</a> | 
        <a href="/map">🗺️ نقشه</a> | 
        <a href="/contacts">📞 تلفن</a> |
        <a href="/manage">📝 مدیریت</a> |
        <a href="/war-room">🎯 اتاق جنگ</a>
    </div>
    
    <div style="display:flex; gap:20px; flex-wrap:wrap;">
        <div class="card" style="flex:1; min-width:350px;">
            <h4 style="color:#4a7c59;">📝 اطلاعات روستا</h4>
            <form method="POST">
                <input type="text" name="village_name" placeholder="🏘️ نام روستا *" required>
                <select name="section">
                    <option value="مرکزی">بخش مرکزی</option>
                    <option value="صوفیان">بخش صوفیان</option>
                    <option value="تسوج">بخش تسوج</option>
                </select>
                <input type="text" name="martyrs" placeholder="🏴 شهدا (با کاما)">
                <textarea name="capacities" rows="3" placeholder="⭐ ظرفیت‌ها (هر کدام در یک خط)"></textarea>
                <textarea name="problems" rows="3" placeholder="❌ مشکلات (هر کدام در یک خط)"></textarea>
                <input type="text" name="key_people" placeholder="👥 افراد حاضر">
                <input type="text" name="opponent" placeholder="🎯 نام رقیب">
                
                <label style="display:flex; align-items:center; gap:10px; margin:10px 0; cursor:pointer;">
                    <input type="checkbox" name="use_ai" style="width:auto;"> 
                    <span class="ai-badge">🤖 استفاده از هوش مصنوعی</span>
                </label>
                
                <button type="submit" class="btn btn-ai">🤖 تولید با هوش مصنوعی</button>
            </form>
        </div>
        
        <div class="card" style="flex:1; min-width:350px;">
            {% if generated %}
            <h4 style="color:#4a7c59;">✅ متن سخنرانی</h4>
            <div class="speech-box" id="speechText">{{ speech }}</div>
            <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('speechText').innerText);alert('✅ کپی شد!')">📋 کپی</button>
            <a href="/speech"><button class="btn btn-normal" style="margin-top:5px;">🔄 جدید</button></a>
            {% else %}
            <div style="text-align:center; padding:50px; color:#999;">
                <div style="font-size:5rem;">🎤</div>
                <h3>متن سخنرانی اینجا نمایش داده می‌شود</h3>
                <p>اطلاعات را وارد کنید و دکمه را بزنید</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
