<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تولید سخنرانی | دکتر سهرابی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { font-family: Tahoma; }
        body { background: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; margin: 15px auto; max-width: 1200px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #0c4a6e; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .header a { color: white; margin: 0 10px; text-decoration: none; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; font-weight: bold; }
        .btn-generate { background: linear-gradient(90deg, #0ea5e9, #0284c7); color: white; }
        .btn-copy { background: #10b981; color: white; margin-top: 10px; }
        .btn-back { background: #6b7280; color: white; margin-top: 10px; }
        .speech-box { background: linear-gradient(135deg, #fefefe, #f8f9fa); padding: 30px; border-radius: 15px; line-height: 2.8; white-space: pre-wrap; border: 2px solid #0c4a6e; font-size: 1.05rem; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section-title { color: #0c4a6e; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🎤 تولید سخنرانی حرفه‌ای</h2>
        <a href="/">📊 داشبورد</a> | 
        <a href="/map">🗺️ نقشه</a> | 
        <a href="/contacts">📞 تلفن</a> |
        <a href="/manage">📝 مدیریت</a>
        <a href="/war-room">🎯 اتاق جنگ</a>
    </div>
    
    <div class="row" style="display:flex; gap:20px; flex-wrap:wrap;">
        <!-- فرم ورودی -->
        <div class="card" style="flex:1; min-width:350px;">
            <h4>📝 اطلاعات روستا</h4>
            <form method="POST" id="speechForm">
                <label>🏘️ نام روستا *</label>
                <input type="text" name="village_name" placeholder="مثلاً: اندبیل" required>
                
                <label>📍 بخش</label>
                <select name="section">
                    <option value="مرکزی">مرکزی</option>
                    <option value="تسوج">تسوج</option>
                    <option value="صوفیان">صوفیان</option>
                </select>
                
                <label>👥 جمعیت تقریبی</label>
                <input type="text" name="population" placeholder="مثلاً: ۲,۴۰۰ نفر">
                
                <label>🏠 تعداد خانوار</label>
                <input type="text" name="households" placeholder="مثلاً: ۶۵۰ خانوار">
                
                <label>🏴 شهدا (با کاما جدا کنید)</label>
                <input type="text" name="martyrs" placeholder="مثلاً: شهید رحیمی، شهید عباس‌زاده">
                
                <label>⭐ ظرفیت‌ها (هر کدام در یک خط)</label>
                <textarea name="capacities" rows="4" placeholder="باغات سیب و گردو
چشمه آب معدنی
نیروی جوان و تحصیل‌کرده"></textarea>
                
                <label>❌ مشکلات (هر کدام در یک خط)</label>
                <textarea name="problems" rows="4" placeholder="کمبود آب کشاورزی
نبود سردخانه
مهاجرت جوانان"></textarea>
                
                <label>🎯 نام کاندیدای رقیب</label>
                <input type="text" name="opponent" placeholder="مثلاً: آقای فلاحی">
                
                <label>📋 افراد تأثیرگذار حاضر در جلسه</label>
                <textarea name="key_people" rows="2" placeholder="مثلاً: حاج رضا محمدی (رئیس شورا)، خانم زهرا حسینی (کارآفرین)"></textarea>
                
                <button type="submit" class="btn btn-generate">🚀 تولید سخنرانی حرفه‌ای</button>
            </form>
        </div>
        
        <!-- خروجی -->
        <div class="card" style="flex:1; min-width:350px;">
            {% if generated %}
            <h4>✅ متن سخنرانی</h4>
            <div class="speech-box" id="speechText">{{ speech }}</div>
            <button class="btn btn-copy" onclick="copySpeech()">📋 کپی متن سخنرانی</button>
            <a href="/speech" class="btn btn-back" style="display:block; text-align:center; text-decoration:none;">🔄 ساخت سخنرانی جدید</a>
            {% else %}
            <div style="text-align:center; padding:50px;">
                <div style="font-size:5rem;">🎤</div>
                <h3>متن سخنرانی اینجا نمایش داده می‌شود</h3>
                <p style="color:#6b7280;">لطفاً اطلاعات روستا را وارد کنید و دکمه تولید را بزنید</p>
            </div>
            {% endif %}
        </div>
    </div>
    
    <script>
    function copySpeech() {
        var text = document.getElementById('speechText').innerText;
        navigator.clipboard.writeText(text).then(function() {
            alert('✅ متن سخنرانی با موفقیت کپی شد!');
        });
    }
    </script>
</body>
</html>
