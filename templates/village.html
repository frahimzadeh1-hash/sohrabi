{% extends "base.html" %}
{% block content %}

<div class="card">
    <div class="card-header bg-info text-white">
        <h4>🏘️ پروفایل روستای {{ village_name }}</h4>
    </div>
    <div class="card-body">
        <table class="table table-bordered">
            {% for key, value in village.items() %}
            <tr>
                <th>{{ key }}</th>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>

<div class="text-center mt-3">
    <a href="/speech" class="btn btn-success btn-lg">🎤 تولید سخنرانی برای {{ village_name }}</a>
</div>

{% endblock %}
