<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد انتخاباتی | دکتر سهرابی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');
        * { font-family: 'Vazirmatn', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .navbar { background: linear-gradient(90deg, #0c4a6e, #075985); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stat-box { background: white; border-radius: 12px; padding: 20px; text-align: center; margin: 10px; }
        .stat-number { font-size: 2.5rem; font-weight: 700; }
        .btn-primary { background: linear-gradient(90deg, #0ea5e9, #0284c7); border: none; padding: 12px 30px; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🇮🇷 ستاد انتخاباتی دکتر سهرابی</a>
            <div>
                <a class="nav-link d-inline text-white" href="/">داشبورد</a>
                <a class="nav-link d-inline text-white mx-3" href="/speech">تولید سخنرانی</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer class="text-center mt-5 py-4 text-muted">
        <small>تمامی حقوق محفوظ است © ۱۴۰۵</small>
    </footer>
</body>
</html>
